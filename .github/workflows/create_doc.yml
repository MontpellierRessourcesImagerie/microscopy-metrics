name: "Sphinx: Render and Deploy Docs"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y latexmk texlive-latex-extra dvipng  # Optionnel pour les PDFs

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install "sphinx>=8.0,<9.0" sphinxcontrib-napoleon sphinx-rtd-theme sphinx-tabs

      - name: Build HTML
        working-directory: docs
        env:
          QT_QPA_PLATFORM: offscreen
          MPLBACKEND: Agg
        run: |
          mkdir -p _static
          make clean
          make html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          keep_files: false
